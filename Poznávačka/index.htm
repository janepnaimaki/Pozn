<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Poznáváčka</title>

<style>
body{
    font-family: Arial;
    text-align:center;
    background:#f5f5f5;
    margin:0;
    padding:20px;
}

.container{
    max-width:800px;
    margin:auto;
}

.card{
    background:white;
    padding:20px;
    border-radius:10px;
    margin-top:10px;
}

input{
    padding:8px;
    width:80%;
    margin-top:10px;
}

button{
    padding:8px 12px;
    margin:5px;
    cursor:pointer;
}

.small{ color:gray; }

img{
    max-width:100%;
    max-height:300px;
    margin:10px auto;
    display:block;
    border-radius:10px;
}
</style>
</head>

<body>

<div class="container">

<h1>Poznáváčka</h1>

<div class="card">

<button onclick="toggleSettings()">⚙️ Nastavení</button>
<button onclick="restart()">🔄 Restart</button>

<div id="settings" style="display:none; text-align:left;">
<h3>Režim</h3>
<select id="mode">
    <option value="random">Náhodně</option>
    <option value="order">Po řadě</option>
</select>

<br><br>
<button onclick="applySettings()">Použít</button>
</div>

</div>

<div class="card">

<h2>Poznáváčka</h2>

<img id="img" src="" alt="obrázek">

<p class="small" id="category"></p>

<input id="answer" placeholder="Napiš odpověď">

<br>

<button onclick="check()">Odeslat</button>
<button onclick="skip()">Nevím</button>

<p id="result"></p>

<p>Skóre: <span id="score">0</span> / <span id="total">0</span></p>

</div>

</div>

<script>

// ===== DATA (SEM DOPLNÍME OBRAZKY) =====
const data = [
{name:"Anabaena", category:"Sinice", image:"images/Sinice/anabaena.jpg"},
{name:"sinivka", category:"Sinice", image:"images/Sinice/sinivka.jpg"},

{name:"trepka", category:"Protista", image:"images/Protista/trepka.jpg"},
{name:"lamblie", category:"Protista", image:"images/Protista/lamblie.jpg"}
];

// ===== STAV =====
let filtered = data;
let current = null;
let index = 0;

let score = 0;
let total = 0;

let mode = "random";

// ===== NORMALIZACE =====
function normalize(t){
    return t.toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g,"")
    .trim();
}

// ===== START / SETTINGS =====
function applySettings(){
    mode = document.getElementById("mode").value;
    next();
}

// ===== MENU =====
function toggleSettings(){
    let s = document.getElementById("settings");
    s.style.display = (s.style.display === "none" || s.style.display === "") ? "block" : "none";
}

// ===== DALŠÍ OTÁZKA =====
function next(){

    if(mode === "random"){
        current = filtered[Math.floor(Math.random() * filtered.length)];
    }else{
        current = filtered[index];
        index++;
        if(index >= filtered.length) index = 0;
    }

    document.getElementById("img").src = current.image;
    document.getElementById("category").textContent = current.category;
    document.getElementById("answer").value = "";
    document.getElementById("result").textContent = "";
}

// ===== KONTROLA =====
function check(){
    let user = normalize(document.getElementById("answer").value);
    let correct = normalize(current.name);

    total++;

    if(user === correct){
        score++;
        document.getElementById("result").textContent = "✅ Správně";
    }else{
        document.getElementById("result").textContent =
            "❌ Správně: " + current.name;
    }

    updateScore();
    setTimeout(next, 700);
}

// ===== NEVÍM =====
function skip(){
    total++;
    document.getElementById("result").textContent =
        "➡️ Správně: " + current.name;

    updateScore();
    setTimeout(next, 700);
}

// ===== RESET =====
function restart(){
    score = 0;
    total = 0;
    updateScore();
    next();
}

// ===== SCORE =====
function updateScore(){
    document.getElementById("score").textContent = score;
    document.getElementById("total").textContent = total;
}

applySettings();

</script>

</body>
</html>
