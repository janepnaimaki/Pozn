<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Poznáváčka</title>

<style>
:root {
    --bg-color: #f5f5f5;
    --text-color: #000;
    --card-bg: white;
    --card-border: #ccc;
    --input-bg: white;
    --input-text: #000;
    --category-bg: #eee;
}

body.dark-mode {
    --bg-color: #1e1e1e;
    --text-color: #e0e0e0;
    --card-bg: #2d2d2d;
    --card-border: #444;
    --input-bg: #3d3d3d;
    --input-text: #e0e0e0;
    --category-bg: #3d3d3d;
}

body{
    font-family: Arial;
    text-align:center;
    background:var(--bg-color);
    color:var(--text-color);
    margin:0;
    padding:20px;
    transition: background 0.3s, color 0.3s;
    -ms-overflow-style: none;
    scrollbar-width: none;
    overflow: hidden;
}

body::-webkit-scrollbar {
    display: none;
}

.container{
    max-width:800px;
    margin:auto;
}

.card{
    background:var(--card-bg);
    padding:20px;
    border-radius:10px;
    margin-top:10px;
    transition: background 0.3s;
}

input{
    padding:8px;
    width:80%;
    margin-top:10px;
    background:var(--input-bg);
    color:var(--input-text);
    border:1px solid var(--card-border);
    border-radius:5px;
    transition: background 0.3s, color 0.3s;
}

button{
    padding:8px 12px;
    margin:5px;
    cursor:pointer;
    border-radius:8px;
    background:var(--card-bg);
    color:var(--text-color);
    border:1px solid var(--card-border);
    transition: background 0.3s, color 0.3s;
}

.top-buttons{
    display:flex;
    gap:10px;
    justify-content:center;
    margin-bottom:10px;
}

.top-buttons button{
    flex:1;
}

.mode-buttons{
    display:flex;
    gap:10px;
    justify-content:center;
    margin:15px 0;
}

.mode-button{
    padding:10px 20px;
    border:2px solid var(--card-border);
    background:var(--card-bg);
    color:var(--text-color);
    cursor:pointer;
    border-radius:8px;
    font-size:14px;
    transition:all 0.3s;
}

.mode-button.active{
    background:#4CAF50;
    color:white;
    border-color:#45a049;
}

.small{ color:var(--text-color); opacity:0.7; }

.category-box{
    background:var(--category-bg);
    margin:8px 0;
    border-radius:8px;
    padding:10px;
    text-align:left;
    border:1px solid var(--card-border);
    transition: background 0.3s;
}

.category-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    font-weight:bold;
    cursor:pointer;
    user-select:none;
}

.category-header:hover{
    opacity:0.8;
}

.arrow{
    display:inline-block;
    transition:transform 0.3s;
    font-size:18px;
    margin-right:10px;
}

.arrow.open{
    transform:rotate(90deg);
}

.category-checkbox{
    cursor:pointer;
    width:auto;
    margin:0;
    padding:0;
}

.org-list{
    margin-top:8px;
    padding-left:20px;
    display:none;
    max-height:400px;
    overflow-y:auto;
    scrollbar-width: thin;
    scrollbar-color: var(--card-border) var(--category-bg);
}

.org-list.open{
    display:block;
}

.org-list::-webkit-scrollbar {
    width: 10px;
    height: 10px;
}

.org-list::-webkit-scrollbar-track {
    background: var(--category-bg);
}

.org-list::-webkit-scrollbar-thumb {
    background: var(--card-border);
    border-radius: 5px;
}

.org-list::-webkit-scrollbar-thumb:hover {
    background: #777;
}

.org-item{
    display:flex;
    align-items:center;
    padding:5px 0;
    font-size:14px;
}

.org-item input{
    width:auto;
    margin:0 8px 0 0;
    padding:0;
}

img{
    max-width:100%;
    max-height:300px;
    margin:10px auto;
    display:block;
    border-radius:10px;
}

.dark-mode-toggle{
    position:fixed;
    top:20px;
    right:20px;
    padding:8px 12px;
    border-radius:8px;
    border:none;
    cursor:pointer;
    background:var(--card-bg);
    color:var(--text-color);
    font-size:18px;
    transition: all 0.3s;
}

.dark-mode-toggle:hover{
    transform:scale(1.1);
}
</style>
</head>

<body>

<button class="dark-mode-toggle" onclick="toggleDarkMode()" title="Přepnout tmavý režim">🌙</button>

<div class="container">

<h1>Poznáváčka</h1>

<div class="card">

<div class="top-buttons">
    <button onclick="toggleSettings()">⚙️ Nastavení</button>
    <button onclick="restart()">🔄 Restart</button>
</div>

<div id="settings" style="display:none; text-align:left;">

<h3>Výběr kategorií</h3>
<div id="selector"></div>

<h3>Režim</h3>
<div class="mode-buttons">
    <button class="mode-button active" onclick="setMode('random')">Náhodně</button>
    <button class="mode-button" onclick="setMode('order')">Po řadě</button>
</div>

<br><br>
<button onclick="applySettings()">Použít</button>

</div>

</div>

<div class="card">

<h2>Познáváčka</h2>

<img id="img">

<p class="small" id="category"></p>

<input id="answer" placeholder="Napiš odpověď">

<br>

<button onclick="check()">Odeslat</button>
<button onclick="skip()">Nevím</button>

<p id="result"></p>

<p>Skóre: <span id="score">0</span> / <span id="total">0</span></p>

</div>

    document.body.classList.toggle('dark-mode');
    localStorage.setItem('darkMode', document.body.classList.contains('dark-mode'));
    updateDarkModeButton();
}

function updateDarkModeButton(){
    const btn = document.querySelector('.dark-mode-toggle');
    btn.textContent = document.body.classList.contains('dark-mode') ? '☀️' : '🌙';
}

if(localStorage.getItem('darkMode') === 'true'){
    document.body.classList.add('dark-mode');
    updateDarkModeButton();
}

// ===== NORMALIZE =====
function normalize(t){
    return t.toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g,"")
    .trim();
}

// ===== STATE =====
let filtered = data;
let current = null;
let index = 0;

let score = 0;
let total = 0;

let mode = "random";

// ===== TOGGLE SETTINGS =====
function toggleSettings(){
    let settings = document.getElementById("settings");
    settings.style.display = (settings.style.display === "none") ? "block" : "none";
}

// ===== SET MODE =====
function setMode(newMode){
    mode = newMode;
    let buttons = document.querySelectorAll(".mode-button");
    buttons.forEach(btn => btn.classList.remove("active"));
    event.target.classList.add("active");
}

// ===== BUILD MENU =====
function buildSelector(){
    let container = document.getElementById("selector");
    container.innerHTML = "";
    let groups = {};
    data.forEach(d=>{
        if(!groups[d.category]) groups[d.category] = [];
        groups[d.category].push(d);
    });
    for(let cat in groups){
        let box = document.createElement("div");
        box.className = "category-box";
        let itemsHtml = groups[cat].map(o=>`
            <div class="org-item">
                <input type="checkbox" value="${o.name}" checked>
                <span>${o.name}</span>
            </div>
        `).join("");
        box.innerHTML = `
        <div class="category-header" onclick="toggleCategoryList(event)">
            <span class="arrow">▶</span>
            <span class="category-name">${cat}</span>
            <input type="checkbox" class="category-checkbox" checked onchange="toggleGroup(event)">
        </div>
        <div class="org-list">
            ${itemsHtml}
        </div>
        `;
        container.appendChild(box);
    }
}

// ===== CATEGORY TOGGLE =====
function toggleCategoryList(event){
    if(event.target.closest('.category-checkbox')) return;
    let box = event.currentTarget.closest(".category-box");
    let list = box.querySelector(".org-list");
    let arrow = box.querySelector(".arrow");
    list.classList.toggle("open");
    arrow.classList.toggle("open");
}

function toggleGroup(event){
    let box = event.currentTarget.closest(".category-box");
    let checks = box.querySelectorAll(".org-list input[type=checkbox]");
    checks.forEach(c=>c.checked = event.currentTarget.checked);
}

// ===== APPLY =====
function applySettings(){
    let checks = document.querySelectorAll("#selector .org-item input");
    let selected = [];
    checks.forEach(c=>{
        if(c.checked) selected.push(c.value);
    });
    filtered = data.filter(d => selected.includes(d.name));
    score = 0;
    total = 0;
    index = 0;
    updateScore();
    next();
    document.getElementById("settings").style.display = "none";
}

// ===== NEXT =====
function next(){
    if(mode === "random"){
        current = filtered[Math.floor(Math.random()*filtered.length)];
    } else {
        current = filtered[index];
        index++;
        if(index >= filtered.length) index = 0;
    }
    document.getElementById("img").src = current.image;
    document.getElementById("category").textContent = current.category;
    document.getElementById("answer").value = "";
    document.getElementById("result").textContent = "";
}

// ===== CHECK =====
function check(){
    let user = normalize(document.getElementById("answer").value);
    let correct = normalize(current.name);
    total++;
    if(user === correct){
        score++;
        document.getElementById("result").textContent = "✅ Správně";
    } else {
        document.getElementById("result").textContent = "❌ Správně: " + current.name;
    }
    updateScore();
    setTimeout(next, 600);
}

// ===== SKIP =====
function skip(){
    total++;
    document.getElementById("result").textContent = "➡️ Správně: " + current.name;
    updateScore();
    setTimeout(next, 600);
}

// ===== RESET =====
function restart(){
    score = 0;
    total = 0;
    updateScore();
    next();
}

// ===== SCORE =====
function updateScore(){
    document.getElementById("score").textContent = score;
    document.getElementById("total").textContent = total;
}

// START
buildSelector();
applySettings();

</script>

</html>
